<!DOCTYPE html>
<html lang="en">
    <head>
        <title>TO DO LIST</title>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="to-do">
            <h1>To Do List</h1>
            <h2>Plan your day with us</h2>
            <p>Double click to edit task</p>
            <div class="task">
                <input type="text" id="task" placeholder="Enter task"/>
                <button id="add" onclick="addTask()">+ Add</button>
            </div>
            <button id="clear" onclick="clearCompleted()">x Clear Completed</button>
            <ul id="list">
            </ul>
        </div>
        <script src="js/function.js"></script>
    </body>
</html>
